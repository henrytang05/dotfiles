set-environment -g ZDOTDIR "$HOME/.config/zsh"
set -g default-command "${SHELL}"
# First remove *all* keybindings
unbind-key -n C-\;
# Now reinsert all the regular tmux keys
set -g prefix C-s
bind ^X copy-mode
# bind ^X lock-server
bind c new-window -c "$HOME"
bind ^C new-window -c "#{pane_current_path}"
# bind ^D detach
bind ^N last-pane
# bind * list-clients

# # Shift arrow to switch windows
bind -n C-M-h previous-window
bind -n C-M-l next-window

# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# bind -n M-H previous-window
# bind -n M-L next-window

bind r command-prompt "rename-window %%"
bind R source-file ~/.tmux.conf
bind ^A last-window
# bind ^W list-windows
# bind w list-windows
bind z resize-pane -Z
bind ^z resize-pane -Z
bind ^L refresh-client
bind l refresh-client

bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind ^v split-window -h -c "#{pane_current_path}"

# bind '"' choose-window
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r -T prefix , resize-pane -L 20
bind -r -T prefix . resize-pane -R 20
bind -r -T prefix - resize-pane -D 7
bind -r -T prefix = resize-pane -U 7
bind : command-prompt
bind * setw synchronize-panes
bind X kill-pane
bind x swap-pane -D
bind S choose-session
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Options
# set-option -g default-terminal 'screen-256color'
set -g default-terminal "tmux-256color"
# set-option -g terminal-overrides ',xterm-256color:RGB'
set -g mouse on
set -g base-index 1              # start indexing windows at 1 instead of 0
set -g detach-on-destroy off     # don't exit from tmux when closing a session
set -g escape-time 0             # zero-out escape time delay
set -g history-limit 1000000     # increase history size (from 2,000)
set -g renumber-windows on      # renumber all windows when any window is closed
set -g set-clipboard on          # use system clipboard
setw -g mode-keys vi
setw -g monitor-activity on
set -g visual-activity off
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'
set-option -g status-position top
set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
set -g @fzf-url-history-limit '2000'


set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank' 
# prefix + y: yank current command, prefix + Y: yank pwd | copy mode: y: yank to clipboard, Y: paste selection to command line
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'fcsonline/tmux-thumbs'
# prefix + space
set -g @plugin 'sainnhe/tmux-fzf' 
# prefix + F: fzf
set -g @plugin 'wfxr/tmux-fzf-url'
# prefix + u: fzf url
set -g @plugin 'omerxx/catppuccin-tmux' 
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'tmux-plugins/tmux-net-speed'
set -g @plugin 'omerxx/tmux-floax'
# prefix + p: floax
set -g @smuxconf-width '80%'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'TheSast/tmux-nav-master'

set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W#{?window_zoomed_flag,(),}"
set -g @catppuccin_status_modules_right "directory date_time battery"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"
set -g @catppuccin_date_time_text "%H:%M"

set -g @floax-bind 'p'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'blue'
set -g @floax-bind 'p'
set -g @floax-change-path 'true'
set -g @thumbs-command 'echo -n {} | pbcopy'

bind-key "e" display-popup -E -w 40% "sesh connect \"$(
  sesh list -i | gum filter --limit 1 --placeholder 'Pick a sesh' --prompt='⚡'
)\""

run '~/.tmux/plugins/tpm/tpm'

